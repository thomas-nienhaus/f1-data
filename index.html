<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordLearn</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>WordLearn</h1>
      <button class="btn btn--ghost" id="back-btn" data-action="go-dashboard" hidden>← Terug</button>
    </div>
  </header>

  <main>
    <!-- VIEW: Dashboard -->
    <section data-view="dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Totaal woorden</span>
        </div>
        <div class="stat-card stat-card--highlight">
          <span class="stat-value" id="stat-due">0</span>
          <span class="stat-label">Te herhalen vandaag</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-learned">0</span>
          <span class="stat-label">Geleerd</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-streak">0</span>
          <span class="stat-label">Dag streak 🔥</span>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn btn--primary btn--large" data-action="start-session" id="start-session-btn">
          Sessie starten
        </button>
        <button class="btn btn--secondary" data-action="manage-words">
          Woorden beheren
        </button>
      </div>
    </section>

    <!-- VIEW: Word List -->
    <section data-view="word-list" hidden>
      <h2>Woorden beheren</h2>

      <form class="add-word-form" data-action="add-word">
        <div class="form-row">
          <input
            class="input"
            name="source"
            type="text"
            placeholder="Spaans woord (bijv. gato)"
            autocomplete="off"
            required
          >
          <span class="form-arrow">→</span>
          <input
            class="input"
            name="translation"
            type="text"
            placeholder="Nederlandse vertaling (bijv. kat)"
            autocomplete="off"
            required
          >
          <button class="btn btn--primary" type="submit">Toevoegen</button>
        </div>
      </form>

      <ul class="word-list" id="word-list-items">
        <!-- Rendered by ui.js -->
      </ul>

      <p class="empty-state" id="word-list-empty" hidden>
        Geen woorden nog. Voeg je eerste woord toe hierboven!
      </p>
    </section>

    <!-- VIEW: Session -->
    <section data-view="session" hidden>
      <div class="session-header">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <span class="progress-text" id="progress-text">0 / 0</span>
      </div>

      <div class="flashcard" id="flashcard">
        <div class="flashcard__inner">
          <div class="flashcard__front">
            <p class="card-lang-label">Spaans</p>
            <p class="card-word" id="session-word"></p>
            <div class="answer-area">
              <input
                class="input input--large"
                id="session-input"
                type="text"
                placeholder="Typ de vertaling..."
                autocomplete="off"
              >
              <button class="btn btn--primary" data-action="submit-answer" id="submit-btn">
                Controleer
              </button>
            </div>
          </div>

          <div class="flashcard__back">
            <div class="result-header">
              <span class="result-icon" id="result-icon"></span>
              <p class="result-label" id="result-label"></p>
            </div>
            <div class="result-words">
              <div class="result-row">
                <span class="result-row__label">Jouw antwoord:</span>
                <span class="result-row__value" id="result-user-answer"></span>
              </div>
              <div class="result-row">
                <span class="result-row__label">Correct:</span>
                <span class="result-row__value result-row__value--correct" id="result-correct-answer"></span>
              </div>
            </div>
            <div class="result-actions">
              <button class="btn btn--success" data-action="confirm-correct">
                Ik had het goed ✓
              </button>
              <button class="btn btn--danger" data-action="confirm-wrong">
                Ik had het fout ✗
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- VIEW: Session Complete -->
    <section data-view="session-complete" hidden>
      <div class="complete-card">
        <div class="complete-icon">🎉</div>
        <h2>Sessie klaar!</h2>
        <div class="summary-grid" id="session-summary">
          <!-- Rendered by ui.js -->
        </div>
        <button class="btn btn--primary btn--large" data-action="go-dashboard">
          Terug naar dashboard
        </button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
